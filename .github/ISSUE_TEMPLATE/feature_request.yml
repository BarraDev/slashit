name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. A clear use case helps us decide how it should fit SlashIt.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like SlashIt to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there simpler workarounds or other designs?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop app
        - CLI
        - Agents
        - Queue
        - Terminals
        - Jujutsu integration
        - GitHub/Jira import
        - Documentation
        - Other
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request.
          required: true
